<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FCOS Symbiote</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="chat-workspace.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #000000;
      color: #f0ecdf;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <script src="chat-workspace.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      App.init().catch(function(err) {
        console.error('App init failed:', err);
        document.body.innerHTML = '<div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#ef4444;font-size:14px;padding:24px;text-align:center">Init failed: ' + (err.message || err) + '</div>';
      });
    });
  </script>
</body>
</html>
