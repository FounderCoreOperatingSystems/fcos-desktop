<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FCOS Symbiote</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="chat-workspace.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #07070f;
      color: #f0eeff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
  </style>
</head>
<body>
  <!-- ChatWorkspace mounts hub, launcher, taskbar, and dialog into body -->
  <script src="chat-workspace.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      ChatWorkspace.init().catch(err => console.error('ChatWorkspace init:', err));
    });
  </script>
</body>
</html>
